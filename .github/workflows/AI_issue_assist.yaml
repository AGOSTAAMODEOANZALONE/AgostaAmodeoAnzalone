name: AI Issue Triage

on:
  issues:
    types: [labeled]

jobs:
  ai-triage:
    if: github.event.label.name == 'request ai review'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AI Assessment Comment Labeler
        uses: github/ai-assessment-comment-labeler@v1.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompts_directory: "./.github/prompts"
          labels_to_prompts_mapping: "default,Issue_evaluator.prompt"
          ai_review_label: "request ai review"
          issue_number: ${{ github.event.issue.number }}
          issue_body: ${{ github.event.issue.body }}
