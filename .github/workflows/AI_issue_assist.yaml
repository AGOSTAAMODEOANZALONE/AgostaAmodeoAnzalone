name: AI Issue Triage

on:
  issues:
    types: [opened, labeled]

jobs:
  ai-triage:
    if: contains(github.event.issue.labels.*.name, 'request ai review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      models: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AI Assessment Comment Labeler
        uses: github/ai-assessment-comment-labeler@v1.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prompts_directory: "./.github/prompts"
          labels_to_prompts_mapping: "default,issue-evaluator.prompt.yml"
          ai_review_label: "request ai review"
          issue_number: ${{ github.event.issue.number }}
          issue_body: ${{ github.event.issue.body }}
